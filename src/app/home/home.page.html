<ion-content class="login-content">
  <div class="login-container">
    <div class="glass-card">
      <div class="header-container">
        <ion-icon name="business" class="app-logo"></ion-icon>
        <h2>TrustHotel</h2>
        <p>Tu portal de servicios móvil</p>
      </div>

      <div class="form-container">
        <ion-item lines="none" class="input-item">
          <ion-icon name="mail-outline" slot="start" class="input-icon"></ion-icon>
          <ion-input type="email" placeholder="Correo Electrónico" [(ngModel)]="email" name="email" required></ion-input>
        </ion-item>

        <ion-item lines="none" class="input-item">
          <ion-icon name="lock-closed-outline" slot="start" class="input-icon"></ion-icon>
          <ion-input type="password" placeholder="Contraseña" [(ngModel)]="password" name="password" required (keyup.enter)="onLogin()"></ion-input>
        </ion-item>

        <div class="error-banner" *ngIf="errorMessage">
          <ion-icon name="alert-circle-outline"></ion-icon>
          <span>{{ errorMessage }}</span>
        </div>

        <ion-button expand="block" class="login-btn" (click)="onLogin()" [disabled]="loading">
          <ion-spinner name="crescent" *ngIf="loading"></ion-spinner>
          <span *ngIf="!loading">Iniciar Sesión</span>
        </ion-button>
      </div>
    </div>
  </div>
</ion-content>
